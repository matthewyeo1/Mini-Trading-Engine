name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'false'
        fetch-depth: 0

    - name: Init required submodules
      run: |
        git submodule sync --recursive || true
        git submodule update --init third_party/whirlpool || true
        git submodule update --init third_party/googletest || true
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake build-essential
    
    - name: Configure
      run: cmake -B build -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF
    
    - name: Build
      run: cmake --build build --parallel
    
    - name: Run tests
      run: ./build/tests/velox_tests

  windows-build:
    name: Windows Build
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'false'
        fetch-depth: 0

    - name: Init required submodules
      run: |
        git submodule sync --recursive || true
        git submodule update --init third_party/whirlpool || true
        git submodule update --init third_party/googletest || true
    
    - name: Configure
      run: cmake -B build -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF
    
    - name: Build
      run: cmake --build build --config Release --parallel
    
    - name: Run tests
      run: ./build/tests/Release/velox_tests.exe