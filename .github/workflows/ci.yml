name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 0'  # Weekly Sunday

jobs:
  test-linux:
    name: Linux (GCC/Clang)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        build_type: [Release, Debug]
        
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup compiler
      if: matrix.compiler == 'gcc'
      run: |
        sudo apt update
        sudo apt install -y g++-11
        echo "CC=gcc-11" >> $GITHUB_ENV
        echo "CXX=g++-11" >> $GITHUB_ENV
    
    - name: Setup Clang
      if: matrix.compiler == 'clang'
      run: |
        sudo apt update
        sudo apt install -y clang-12
        echo "CC=clang-12" >> $GITHUB_ENV
        echo "CXX=clang++-12" >> $GITHUB_ENV
    
    - name: Configure
      run: |
        cmake -B build_ci \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DBUILD_TESTS=ON \
          -DBUILD_BENCHMARKS=OFF \
          -DCI_BUILD=ON
    
    - name: Build
      run: cmake --build build_ci --parallel
    
    - name: Run tests
      run: ./build_ci/tests/velox_tests
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test_results_${{ matrix.compiler }}_${{ matrix.build_type }}
        path: build_ci/Testing/

  test-linux-tsan:
    name: Linux ThreadSanitizer
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure with TSAN
      run: |
        cmake -B build_tsan \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBUILD_TESTS=ON \
          -DBUILD_BENCHMARKS=OFF \
          -DENABLE_TSAN=ON \
          -DCI_BUILD=ON
    
    - name: Build
      run: cmake --build build_tsan --parallel
    
    - name: Run tests
      run: ./build_tsan/tests/velox_tests

  test-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure
      run: |
        cmake -B build_ci \
          -DBUILD_TESTS=ON \
          -DBUILD_BENCHMARKS=OFF \
          -DCI_BUILD=ON
    
    - name: Build
      run: cmake --build build_ci --config Release --parallel
    
    - name: Run tests
      run: ./build_ci/tests/Release/velox_tests.exe

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Disable CPU frequency scaling
      run: |
        sudo apt update
        sudo apt install -y linux-tools-common cpufrequtils
        sudo cpupower frequency-set --governor performance
    
    - name: Configure with benchmarks
      run: |
        cmake -B build_bench \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_TESTS=OFF \
          -DBUILD_BENCHMARKS=ON
    
    - name: Build benchmarks
      run: cmake --build build_bench --parallel
    
    - name: Run benchmarks
      run: ./build_bench/benchmarks/velox_benchmarks --benchmark_format=json
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark_results
        path: benchmark_results/

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure with coverage
      run: |
        cmake -B build_cov \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBUILD_TESTS=ON \
          -DBUILD_BENCHMARKS=OFF \
          -DENABLE_COVERAGE=ON
    
    - name: Build
      run: cmake --build build_cov --parallel
    
    - name: Run tests
      run: ./build_cov/tests/velox_tests
    
    - name: Generate coverage report
      run: |
        sudo apt install -y lcov
        lcov --capture --directory . --output-file coverage.info
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/third_party/*' --output-file coverage.info
        lcov --list coverage.info
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.info
        flags: unittests