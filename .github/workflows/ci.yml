name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y libgtest-dev cmake
    
    - name: Configure
      run: cmake -B build -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF
    
    - name: Build
      run: cmake --build build --parallel
    
    - name: Run tests
      run: ./build/tests/velox_tests

  build-windows:
    name: Windows Build
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure
      run: cmake -B build -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF
    
    - name: Build
      run: cmake --build build --config Release --parallel
    
    - name: Run tests
      run: ./build/tests/Release/velox_tests.exe